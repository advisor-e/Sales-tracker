name: Bug report
description: Report a reproducible problem in the Sales Tracker app
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the problem
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps, inputs, and clicks
      placeholder: |
        1. Open app
        2. Load workbook
        3. Go to Pipeline
        4. ...
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Python version (if known)
      placeholder: Windows 11, Python 3.11
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error message or logs
      description: Paste traceback or error text if available
      render: shell
    validations:
      required: false
