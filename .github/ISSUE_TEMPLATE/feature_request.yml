name: Feature request
description: Suggest an enhancement for the Sales Tracker app
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow pain point are you trying to solve?
      placeholder: As a user, I need...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you want to happen
      placeholder: Add a new filter for...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Business impact
      description: Why this matters (time saved, visibility, quality)
    validations:
      required: false
